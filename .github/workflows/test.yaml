name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints.txt

      - name: Install ruff (pinned)
        # ruff only — no torch, no project install needed (fast).
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt ruff

      - name: Run ruff
        run: ruff check .

  types:
    name: Types (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints.txt

      - name: Install (CPU torch + dev; pinned QA toolchain)
        # Gate baseline = full *typed* env: real torch types. CPU wheel from the
        # pytorch index, everything else from PyPI; constraints.txt pins ruff/mypy.
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" -c constraints.txt

      - name: Run mypy
        run: python -m mypy lighttrain tests

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints.txt

      - name: Install dependencies (CPU-only PyTorch)
        # --index-url (not --extra-index-url) for the torch command so we can't
        # accidentally pull a non-CPU/larger wheel from PyPI; the rest from PyPI.
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]" -c constraints.txt

      - name: Run Pytest
        # toml already skips gpu + heavy markers by default
        run: pytest
