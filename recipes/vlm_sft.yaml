# VLM SFT recipe — synthetic frame-folder fixtures (DESIGN R14 dry-run).
#
# Uses SimpleImageProcessor + MultiModalCollator to assemble image batches
# alongside text. Real VLM training is gated on M5 model adapters; this
# recipe verifies that PrepGraph + the multimodal collator produce
# correctly-shaped batches (shapes only — model receives modality_inputs but
# tiny_lm ignores them).

mode: lab
seed: 1337
exp: tiny_vlm_sft
run_root: runs

model: default
model_profiles:
  default:
    name: tiny_lm
    vocab_size: 260
    d_model: 256
    n_layers: 4
    n_heads: 8
    max_seq_len: 256
    dropout: 0.0

prep_graph:
  nodes:
    - name: raw
      kind: load
      source: jsonl:tests/fixtures/vlm_sft.jsonl
      raw_data_version: "0"

    - name: tokenized
      kind: tokenize
      inputs: [raw]
      processor:
        name: chat_template
        tokenizer: { name: byte }
        response_only_mask: true

    - name: train_data
      kind: materialize
      inputs: [tokenized]
      layout: rows
      fmt: jsonl

  terminals: [train_data]

data:
  name: prep_graph
  source: prep_graph:train_data
  tokenizer: { name: byte }
  collator:
    name: multimodal
    max_len: 256
    max_images: 1
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 2
  num_workers: 0

loss: { name: cross_entropy }

optim:
  name: adamw
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

scheduler:
  name: warmup_cosine
  warmup_steps: 5
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine: { name: standard, mixed_precision: bf16 }

trainer:
  name: pretrain
  max_steps: 10
  val_every: 0
  ckpt_every: 10
  log_every: 5
  grad_clip: 1.0
  accumulate: 1

callbacks:
  - { name: throughput, window: 5 }
  - { name: nan_skip, max_skips: 10 }

logger:
  - { name: console, log_every: 5 }
  - { name: jsonl }
