# Sweep demo recipe — base config for R15 acceptance test (DESIGN §26.10).
#
# Tiny model + 50 steps = fast enough for CI sweep runs.
# The sweep spec file (sweep_r15.yaml) injects LR / weight-decay overrides.
#
# Run the sweep:
#   lighttrain sweep -c recipes/sweep_demo.yaml -s recipes/sweep_r15.yaml

mode: lab
seed: 1337
exp: sweep_demo
run_root: runs

model: default
model_profiles:
  default:
    name: tiny_lm
    vocab_size: 260
    d_model: 128
    n_layers: 2
    n_heads: 4
    max_seq_len: 64
    dropout: 0.0

data:
  name: simple
  dataset:
    name: line_file_text
    path: tests/fixtures/tiny_corpus.txt
    max_len: 64
  tokenizer:
    name: byte
  collator:
    name: causal_lm
    max_len: 64
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 4
  num_workers: 0

loss:
  name: cross_entropy

optim:
  name: adamw
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

scheduler:
  name: warmup_cosine
  warmup_steps: 5
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: "no"

trainer:
  name: pretrain
  max_steps: 50
  val_every: 0
  ckpt_every: 0
  log_every: 10
  grad_clip: 1.0
  accumulate: 1

callbacks:
  - { name: nan_skip, max_skips: 5 }

logger:
  - { name: console, log_every: 10 }
  - { name: jsonl }
