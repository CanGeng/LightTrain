# R7 — RWKV stateful language model pretraining (DESIGN §13.2 / §26.9).
#
# Trains a TinyRWKVModel using next-token prediction.  The RWKV recurrent
# state is carried across chunks of the same document and reset at document
# boundaries (batch["_doc_boundary"] = True).
#
# Run with:
#   python -c "from frontier_plugins.architectures.rwkv import TinyRWKVModel"
#   lighttrain train -c recipes/pretrain_rwkv.yaml

mode: lab
seed: 42
exp: r7_rwkv
run_root: runs

model:
  name: tiny_rwkv
  vocab_size: 256
  embed_dim: 64
  num_layers: 2
  chunk_size: 64

data:
  name: simple
  dataset:
    name: line_file_text
    path: tests/fixtures/tiny_corpus.txt
    max_len: 64
  tokenizer:
    name: byte
  collator:
    name: causal_lm
    max_len: 64
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 2
  num_workers: 0

optim:
  name: adamw
  lr: 1.0e-3
  betas: [0.9, 0.95]
  weight_decay: 0.01

scheduler:
  name: warmup_cosine
  warmup_steps: 10
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: "no"

update_rule:
  name: standard
  grad_clip: 1.0
  accumulate_grad_batches: 1

trainer:
  name: pretrain
  max_steps: 200
  val_every: 0
  ckpt_every: 200
  log_every: 20
  arch_profile: rwkv

callbacks:
  - { name: throughput, window: 20 }
  - { name: nan_skip, max_skips: 5 }

logger:
  - { name: console, log_every: 20 }
  - { name: jsonl }
