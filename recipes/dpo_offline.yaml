# R4 — Offline DPO with artifact-cached reference logprobs (DESIGN §15.2 / §26.8).
#
# Requires a pre-built reference-logprob artifact at `artifacts/ref_logprobs_v1`.
# Produce it first with `lighttrain produce-artifact -c recipes/produce_ref_logprobs.yaml`
# or by running `recipes/produce_teacher.yaml` adapted to output per-sample logprobs.
#
# Run with:
#   lighttrain train -c recipes/dpo_offline.yaml

mode: lab
seed: 42
exp: r4_dpo_offline
run_root: runs

model: default
model_profiles:
  default:
    name: tiny_lm
    vocab_size: 260
    d_model: 256
    n_layers: 4
    n_heads: 8
    max_seq_len: 128
    dropout: 0.0

# ----- data —————————————————————————————————————————————————————————————————
# Each sample must have: chosen_input_ids / chosen_labels / chosen_attention_mask
#                        rejected_input_ids / rejected_labels / rejected_attention_mask
# The artifact store supplies: aux.ref.chosen_logprobs / aux.ref.rejected_logprobs
data:
  name: simple
  dataset:
    name: artifact_joined
    base:
      name: preference_jsonl
      path: tests/fixtures/tiny_preference.jsonl
      max_len: 128
    join:
      - store: artifacts/ref_logprobs_v1
        namespace: ref
        missing: require
  tokenizer:
    name: byte
  collator:
    name: preference
    max_len: 128
    pad_id: 256
    ignore_index: -100
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 4
  num_workers: 0

# ----- loss ——————————————————————————————————————————————————————————————————
loss:
  name: dpo
  beta: 0.1

# ----- optimiser + scheduler ————————————————————————————————————————————————
optim:
  name: adamw
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.01

scheduler:
  name: warmup_cosine
  warmup_steps: 20
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

# ----- engine ————————————————————————————————————————————————————————————————
engine:
  name: standard
  mixed_precision: "no"

# ----- trainer ———————————————————————————————————————————————————————————————
trainer:
  name: dpo
  max_steps: 200
  val_every: 0
  ckpt_every: 200
  log_every: 25
  ref_namespace: ref      # must match the `namespace` in the join spec above
  beta: 0.1

# ----- callbacks + logger ————————————————————————————————————————————————————
callbacks:
  - { name: throughput, window: 25 }
  - { name: nan_skip, max_skips: 10 }
  - { name: lineage_recorder, cycle_policy: warn }

logger:
  - { name: console, log_every: 25 }
  - { name: jsonl }
