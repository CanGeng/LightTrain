# SFT chat recipe — hermetic ByteTokenizer + ChatTemplateProcessor (DESIGN R2).
#
# Runs on CPU. Drives PrepGraph end-to-end: load → tokenize → validate →
# pack → materialize, then trains a tiny causal LM on the packed sequences.
# Identical to recipes/pretrain_causal.yaml except for the data path.

mode: lab
seed: 1337
exp: tiny_sft_chat
run_root: runs

model: default
model_profiles:
  default:
    name: tiny_lm
    vocab_size: 260
    d_model: 256
    n_layers: 4
    n_heads: 8
    max_seq_len: 256
    dropout: 0.0

# ----- prep graph -----------------------------------------------------------
prep_graph:
  nodes:
    - name: raw
      kind: load
      source: jsonl:tests/fixtures/sft_chat.jsonl
      raw_data_version: "0"

    - name: tokenized
      kind: tokenize
      inputs: [raw]
      processor:
        name: chat_template
        tokenizer: { name: byte }
        response_only_mask: true

    - name: validated
      kind: validate
      inputs: [tokenized]
      vocab_size: 260
      label_ignore: -100
      min_rows: 1
      max_oov_ratio: 0.05

    - name: packed
      kind: pack
      inputs: [validated]
      seq_len: 256
      eos_id: 258
      pad_id: 256

    - name: train_data
      kind: materialize
      inputs: [packed]
      layout: rows
      fmt: jsonl
      shard_size: 50000

  terminals: [train_data]

data:
  name: prep_graph
  source: prep_graph:train_data
  tokenizer: { name: byte }
  collator: { name: causal_lm, max_len: 256 }
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 4
  num_workers: 0

loss:
  name: cross_entropy

optim:
  name: adamw
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

scheduler:
  name: warmup_cosine
  warmup_steps: 50
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: pretrain
  max_steps: 200
  val_every: 0
  ckpt_every: 200
  log_every: 25
  grad_clip: 1.0
  accumulate: 1

callbacks:
  - { name: throughput, window: 25 }
  - { name: nan_skip, max_skips: 10 }

logger:
  - { name: console, log_every: 25 }
  - { name: jsonl }
