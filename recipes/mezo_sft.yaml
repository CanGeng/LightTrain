# R11 — MeZO gradient-free SFT (DESIGN §13.4 / §26.9).
#
# Fine-tunes a TinyLM on SFT data using MeZOUpdateRule (memory-efficient
# zeroth-order optimisation — no backward pass, no gradient materialisation).
# Loss should decrease; model.parameters()[0].grad must remain None.
#
# Run with:
#   lighttrain train -c recipes/mezo_sft.yaml

mode: lab
seed: 42
exp: r11_mezo
run_root: runs

model: default
model_profiles:
  default:
    name: tiny_lm
    vocab_size: 260
    d_model: 128
    n_layers: 2
    n_heads: 4
    max_seq_len: 128
    dropout: 0.0

data:
  name: simple
  dataset:
    name: sft_jsonl
    path: tests/fixtures/tiny_corpus.txt
    max_len: 128
  tokenizer:
    name: byte
  collator:
    name: causal_lm
    max_len: 128
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 2
  num_workers: 0

optim:
  name: adamw
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.01

scheduler:
  name: constant

engine:
  name: standard
  mixed_precision: "no"

update_rule:
  name: mezo
  eps: 1.0e-3
  seed_per_step: true

trainer:
  name: pretrain
  max_steps: 100
  val_every: 0
  ckpt_every: 100
  log_every: 10

callbacks:
  - { name: throughput, window: 10 }
  - { name: nan_skip, max_skips: 5 }

logger:
  - { name: console, log_every: 10 }
  - { name: jsonl }
