# Single-machine 4-GPU DDP training.
# Launch: torchrun --nproc_per_node 4 -m lighttrain.cli train -c recipes/ddp.yaml
#
# Parallel topology: dp=4 (data-parallel only)

parallel:
  backend: nccl
  dp: 4
  grad_sync:
    name: ddp
    find_unused_parameters: false
    gradient_as_bucket_view: true

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: pretrain
  max_steps: 1000
  ckpt_every: 500
  log_every: 50
  grad_clip: 1.0
  accumulate: 1
