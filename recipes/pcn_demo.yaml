# R10a — Predictive Coding Networks demo (DESIGN §13.4 / §26.9).
#
# Demonstrates PCNUpdateRule on a toy binary classification task.
# A 3-layer MLP is trained with local predictive coding updates (no backprop).
# Loss should decrease over 100 steps.
#
# Run with:
#   python -c "from frontier_plugins.update_rules.pcn import PCNUpdateRule"
#   lighttrain train -c recipes/pcn_demo.yaml

mode: lab
seed: 42
exp: r10_pcn
run_root: runs

model:
  name: mlp_toy
  input_dim: 16
  hidden_dim: 32
  output_dim: 2
  num_layers: 3

data:
  name: simple
  dataset:
    name: synthetic_binary
    input_dim: 16
    num_samples: 256
    seed: ${seed}
  collator:
    name: x_labels
    input_dim: 16
  batch_size: 8
  num_workers: 0

optim:
  name: adamw
  lr: 0.0

scheduler:
  name: constant

engine:
  name: standard
  mixed_precision: "no"

update_rule:
  name: pcn
  n_infer: 10
  lr_infer: 0.05
  lr_weight: 0.005
  activation: relu

trainer:
  name: pretrain
  max_steps: 100
  val_every: 0
  ckpt_every: 100
  log_every: 10

callbacks:
  - { name: throughput, window: 10 }

logger:
  - { name: console, log_every: 10 }
  - { name: jsonl }
