# Tiny pretrain recipe — exercises the M1 stack end-to-end (DESIGN §26.3 / R1).
#
# The defaults below run on CPU. On a GPU box bump batch_size and max_steps;
# the framework will auto-pick CUDA when available.

mode: lab
seed: 1337
exp: tiny_pretrain
run_root: runs

model: default
model_profiles:
  default:
    name: tiny_lm
    vocab_size: 260
    d_model: 256
    n_layers: 4
    n_heads: 8
    max_seq_len: 128
    dropout: 0.0

data:
  name: simple
  dataset:
    name: line_file_text
    path: tests/fixtures/tiny_corpus.txt
    max_len: 128
  tokenizer:
    name: byte
  collator:
    name: causal_lm
    max_len: 128
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 4
  num_workers: 0

loss:
  name: cross_entropy

optim:
  name: adamw
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

scheduler:
  name: warmup_cosine
  warmup_steps: 50
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: pretrain
  max_steps: 2000
  val_every: 0
  ckpt_every: 500
  log_every: 25
  grad_clip: 1.0
  accumulate: 1

callbacks:
  - { name: throughput, window: 50 }
  - { name: nan_skip, max_skips: 10 }
  - { name: best_ckpt, monitor: loss, mode: min }

logger:
  - { name: console, log_every: 25 }
  - { name: jsonl }
  - { name: tensorboard }
