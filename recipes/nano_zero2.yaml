# nano_zero2.yaml — real-GPU DeepSpeed ZeRO-2 smoke on the tiny_lm model.
# Same model/data as nano_model.yaml but ZeRO-2 over NCCL instead of CPU-gloo DDP.
# Launch: torchrun --nproc_per_node=4 -m lighttrain.cli train -c recipes/nano_zero2.yaml

parallel:
  backend: nccl
  dp: 4
  grad_sync:
    name: deepspeed
    zero_stage: 2
    bf16: true
    gradient_clipping: 1.0
    train_micro_batch_size_per_gpu: 8  # = data.batch_size; DS derives train_batch_size from world_size

model: default
model_profiles:
  default:
    name: tiny_lm
    vocab_size: 256
    d_model: 64
    n_layers: 2
    n_heads: 4
    max_seq_len: 32

data:
  name: simple
  dataset:
    name: line_file_text
    path: tests/fixtures/tiny_corpus.txt
    max_len: 32
  tokenizer:
    name: byte
  collator:
    name: causal_lm
    max_len: 32
  sampler:
    name: shuffle
    seed: 42
  batch_size: 8
  num_workers: 0

optim:
  name: adamw
  lr: 1.0e-3
  weight_decay: 0.01

loss:
  name: cross_entropy

logger:
  - { name: console, log_every: 5 }  # loss 打到 stdout
  - { name: jsonl }                   # 写 run_dir/metrics.jsonl

engine:
  name: standard
  mixed_precision: "no"  # DeepSpeed handles precision internally

trainer:
  name: pretrain
  max_steps: 20
  ckpt_every: 0
  log_every: 5
  grad_clip: 1.0
