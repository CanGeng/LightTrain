# R8 — Diffusion eps-prediction with TinyUNet (DESIGN §13.3 / §26.9).
#
# Trains a 1D denoising diffusion model (DDPM) on synthetic random signals.
# Uses DiffusionObjective to inject noise into batch["x"] and trains the
# TinyUNet to predict the added noise (eps-prediction target).
#
# The "dataset" here generates random 1D signals on-the-fly — no real data
# required.  Loss should decrease monotonically over 200 steps.
#
# Run with:
#   lighttrain train -c recipes/diffusion_eps.yaml

mode: lab
seed: 7
exp: r8_diffusion
run_root: runs

# Demo-only toy dataset/collator (synthetic_signal / signal); not a core component.
user_modules: [examples/lab_components.py]

model: default
model_profiles:
  default:
    name: tiny_unet
    in_channels: 1
    base_channels: 16
    channel_mults: [1, 2]
    timesteps: 100
    time_embed_dim: 32

data:
  name: simple
  dataset:
    name: synthetic_signal
    signal_len: 32
    num_samples: 512
    seed: ${seed}
  collator:
    name: signal
    signal_len: 32
    channels: 1
  batch_size: 8
  num_workers: 0

objective:
  name: diffusion
  target: eps
  noise_schedule: linear
  timesteps: 100

optim:
  name: adamw
  lr: 1.0e-3
  betas: [0.9, 0.999]
  weight_decay: 0.0

scheduler:
  name: constant

engine:
  name: standard
  mixed_precision: "no"
  update_rule:
    name: standard   # grad_clip/accumulate are controlled by trainer:

trainer:
  name: pretrain
  max_steps: 200
  val_every: 0
  ckpt_every: 200
  log_every: 20

callbacks:
  - { name: throughput, window: 20 }

logger:
  - { name: console, log_every: 20 }
  - { name: jsonl }
