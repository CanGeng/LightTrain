# Minimal two-model online distillation demo.
#
# The student generates its own completions on-policy; a FROZEN, *separate*
# teacher scores each sampled token; a REINFORCE update moves the student toward
# the teacher. The custom trainer lives in examples/online_distill.py and is
# loaded purely through `user_modules:` (zero core edits).
#
#   lighttrain train -c recipes/online_distill_demo.yaml
#
# This is the in-repo template for the multi-model + online-RL seam documented in
# docs/registry_and_protocols.md §4.11 (the shape OPD / self-rewarding / GAN need,
# which the built-in ppo/grpo trainers can't host).
#
# For REAL distillation, pretrain a teacher and point teacher.checkpoint at it:
#   lighttrain train -c recipes/pretrain_causal.yaml exp=teacher trainer.max_steps=500
#   # then set models.teacher.checkpoint: runs/teacher/<...>/checkpoints/step_500
# With the checkpoint omitted the teacher is random-init: the loop still runs and
# `reverse_kl` still descends (the student matches whatever fixed teacher it is given).

mode: lab
seed: 7
exp: online_distill_demo
run_root: runs

user_modules:
  - examples/online_distill.py

# Two models via the `models:` set — the seam custom paradigms read as
# self.models["student"] / self.models["teacher"].
models:
  student:
    spec: { name: tiny_lm, vocab_size: 260, d_model: 128, n_layers: 4, n_heads: 4, max_seq_len: 128, dropout: 0.0 }
    trainable: true
    optimizer: main
  teacher:
    spec: { name: tiny_lm, vocab_size: 260, d_model: 128, n_layers: 4, n_heads: 4, max_seq_len: 128, dropout: 0.0 }
    trainable: false
    # checkpoint: runs/teacher/<...>/checkpoints/step_500   # optional; omit -> random-init teacher

optimizers:
  main:
    name: adamw
    lr: 1.0e-3
    betas: [0.9, 0.95]
    weight_decay: 0.0

data:
  name: simple
  dataset:
    name: line_file_text
    path: tests/fixtures/tiny_corpus.txt
    max_len: 16          # prompt length
  tokenizer:
    name: byte
  collator:
    name: causal_lm
    max_len: 16
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 8
  num_workers: 0

scheduler:
  name: warmup_cosine
  warmup_steps: 5
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: "no"

trainer:
  name: online_distill
  max_steps: 30
  ckpt_every: 0
  log_every: 5
  max_new_tokens: 16     # response length the student samples per prompt
  temperature: 1.0
  grad_clip: 1.0

callbacks:
  - { name: throughput, window: 10 }
  - { name: nan_skip, max_skips: 5 }

logger:
  - { name: console, log_every: 5 }
  - { name: jsonl }
