# 16-GPU 3D parallel: dp=4, tp=2, pp=2.
# Launch: torchrun --nproc_per_node 16 -m lighttrain.cli train -c frontier_plugins/distributed/recipes/3d_parallel.yaml

parallel:
  backend: nccl
  dp: 4
  tp: 2
  pp: 2
  tensor_parallel:
    auto_plan_for: llama
  pipeline:
    n_microbatches: 8
    schedule: 1f1b
    stage_spec:
      - { layers: "model.embed_tokens,model.layers.0-15" }
      - { layers: "model.layers.16-31,model.norm,lm_head" }
  grad_sync:
    name: fsdp
    sharding_strategy: HYBRID_SHARD
    state_dict_type: full

engine:
  name: standard
  mixed_precision: no  # FSDP handles precision

trainer:
  name: pretrain
  max_steps: 1000
  ckpt_every: 500
  grad_clip: 1.0
  accumulate: 4
