# Train GPT-2 (124M) on OpenWebText — matches nanoGPT's config/train_gpt2.py
#
# First prepare the data (~54 GB, takes a while):
#   python examples/nanoGPT/data/openwebtext/prepare.py
#
# Then train (needs a beefy GPU, ~4 days on a single A100):
#   lighttrain train -c examples/nanoGPT/configs/train_gpt2.yaml
#
# For DDP (4 GPUs):
#   torchrun --standalone --nproc_per_node=4 -m lighttrain.cli train \
#     -c examples/nanoGPT/configs/train_gpt2.yaml ++trainer.accumulate=10

user_modules:
  - examples/nanoGPT/model.py
  - examples/nanoGPT/components.py

mode: prod
seed: 1337
exp: nanogpt_gpt2
run_root: runs

model: default
model_profiles:
  default:
    name: nano_gpt
    block_size: 1024
    vocab_size: 50304    # GPT-2 vocab padded to multiple of 64
    n_layer: 12
    n_head: 12
    n_embd: 768
    dropout: 0.0
    bias: false

data:
  name: simple
  dataset:
    name: memmap_bin
    path: examples/nanoGPT/data/openwebtext/train.bin
    block_size: 1024
  val_dataset:
    name: memmap_bin
    path: examples/nanoGPT/data/openwebtext/val.bin
    block_size: 1024
  tokenizer:
    name: byte
  collator:
    name: stack_xy
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 12         # micro-batch; use accumulate to reach effective 480
  num_workers: 4

loss:
  name: cross_entropy

optim:
  name: adamw
  lr: 6.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

scheduler:
  name: warmup_cosine
  warmup_steps: 2000
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1     # min_lr = 6e-5

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: pretrain
  max_steps: 600000
  val_every: 2000
  ckpt_every: 2000
  log_every: 1
  grad_clip: 1.0
  accumulate: 40        # 12 * 40 = 480 effective batch size (single GPU)

callbacks:
  - { name: throughput, window: 50 }
  - { name: best_ckpt, monitor: val/loss, mode: min }

logger:
  - { name: console, log_every: 1 }
  - { name: jsonl }
  - { name: tensorboard }
