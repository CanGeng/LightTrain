# MiniMind 模型架构基础 — 被其他 configs 通过 defaults 引入
# 修改此文件即可统一所有训练阶段的模型规格。
#
# 使用方式（在各 training config 顶部）：
#   defaults:
#     - _model
#
# CLI 覆盖：
#   model_profiles.default.hidden_size=768
#   model_profiles.default.num_hidden_layers=16
#   model_profiles.default.use_moe=true

model: default
model_profiles:
  default:
    name: minimind
    # --- 核心架构 ---
    hidden_size: 512
    num_hidden_layers: 8
    num_attention_heads: 8       # Q heads
    num_key_value_heads: 4       # KV heads (GQA; 等于 num_attention_heads 则退化为 MHA)
    # intermediate_size: null    # FFN 隐层，默认 ceil(hidden*π/64)*64；覆盖时填具体整数
    # --- 上下文 / RoPE ---
    max_position_embeddings: 32768
    rope_theta: 1.0e+6
    # --- 词表 / 嵌入 ---
    vocab_size: 6400
    tie_word_embeddings: true
    # --- 训练稳定性 ---
    dropout: 0.0
    rms_norm_eps: 1.0e-6
    flash_attn: true
    # --- MoE (use_moe=true 时生效) ---
    use_moe: false
    num_experts: 4
    num_experts_per_tok: 1
