# MiniMind 预训练 — 对应原 trainer/train_pretrain.py
#
# 先准备数据（从 HuggingFace 或本地 JSONL）：
#   数据格式：{"text": "..."}
#
# 训练：
#   lighttrain train -c examples/MiniMind/configs/pretrain.yaml
#
# 常用 CLI 覆盖（不需要编辑文件）：
#   模型规格  : model_profiles.default.hidden_size=768 model_profiles.default.num_hidden_layers=16
#   MoE      : model_profiles.default.use_moe=true
#   批次/步数 : data.batch_size=64 trainer.max_steps=10000 trainer.accumulate=4
#   学习率    : optim.lr=3e-4
#   数据路径  : data.dataset.data_path=your/data.jsonl

user_modules:
  - examples/MiniMind/model/model_adapter.py
  - examples/MiniMind/dataset/lm_dataset.py

mode: prod
seed: 42
exp: minimind_pretrain
run_root: runs

model: default
model_profiles:
  default:
    name: minimind
    # --- 核心架构 ---
    hidden_size: 512
    num_hidden_layers: 8
    num_attention_heads: 8       # Q heads
    num_key_value_heads: 4       # KV heads (GQA; 等于 num_attention_heads 则退化为 MHA)
    # intermediate_size: null    # FFN 隐层, 默认 ceil(hidden*π/64)*64；覆盖时填具体整数
    # --- 上下文 / RoPE ---
    max_position_embeddings: 32768
    rope_theta: 1.0e+6
    # --- 词表 / 嵌入 ---
    vocab_size: 6400
    tie_word_embeddings: true
    # --- 训练稳定性 ---
    dropout: 0.0
    rms_norm_eps: 1.0e-6
    flash_attn: true
    # --- MoE (use_moe=true 时生效) ---
    use_moe: false
    num_experts: 4
    num_experts_per_tok: 1

data:
  name: simple
  dataset:
    name: minimind_pretrain
    data_path: dataset/pretrain_t2t_mini.jsonl
    max_length: 340
  tokenizer:
    name: hf_auto
    path: examples/MiniMind/model
  collator:
    name: minimind_pad
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 32
  num_workers: 8

loss:
  name: cross_entropy

optim:
  name: adamw
  lr: 5.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.01

scheduler:
  name: warmup_cosine
  warmup_steps: 0
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: pretrain
  max_steps: 20000
  val_every: 0
  ckpt_every: 1000
  log_every: 100
  grad_clip: 1.0
  accumulate: 8

callbacks:
  - { name: throughput, window: 50 }
  - { name: nan_skip, max_skips: 10 }

logger:
  - { name: console, log_every: 100 }
  - { name: jsonl }
  - { name: tensorboard }
