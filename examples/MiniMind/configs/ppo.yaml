# MiniMind PPO — 对应原 trainer/train_ppo.py
#
# 数据格式：{"conversations": [...]}（同 RLAIF 格式）
# 需要先训练一个 reward model（使用 SFT 权重加 v_head）。
#
# 训练：
#   lighttrain train -c examples/MiniMind/configs/ppo.yaml

user_modules:
  - examples/MiniMind/model/model_adapter.py
  - examples/MiniMind/dataset/lm_dataset.py

mode: prod
seed: 42
exp: minimind_ppo
run_root: runs

models:
  actor:
    name: minimind
    hidden_size: 512
    num_hidden_layers: 8
  critic:
    name: minimind
    hidden_size: 512
    num_hidden_layers: 8

data:
  name: simple
  dataset:
    name: minimind_rlaif
    jsonl_path: dataset/rlaif_mini.jsonl
    max_length: 512
  tokenizer:
    name: hf_auto
    path: examples/MiniMind/model
  collator:
    name: minimind_pad
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 4
  num_workers: 4

optim:
  name: adamw
  lr: 1.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.01

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: ppo
  max_steps: 1000
  val_every: 0
  ckpt_every: 500
  log_every: 10
  grad_clip: 1.0
  kl_coef: 0.05
  clip_ratio: 0.2
  max_new_tokens: 256
  reward_model:
    name: minimind
    hidden_size: 512
    num_hidden_layers: 8
    checkpoint: runs/minimind_sft/checkpoints/best

logger:
  - { name: console, log_every: 10 }
  - { name: jsonl }
