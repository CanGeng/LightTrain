# MiniMind DPO — 对应原 trainer/train_dpo.py
#
# 数据格式：{"chosen": [...conversations...], "rejected": [...conversations...]}
#
# 训练：
#   lighttrain train -c examples/MiniMind/configs/dpo.yaml

defaults:
  - _model

user_modules:
  - examples/MiniMind/model/model_adapter.py
  - examples/MiniMind/dataset/lm_dataset.py

mode: prod
seed: 42
exp: minimind_dpo
run_root: runs

data:
  name: simple
  dataset:
    name: minimind_dpo
    file_path: dataset/dpo_mini.jsonl
    max_length: 1024
  tokenizer:
    name: hf_auto
    path: examples/MiniMind/model
  collator:
    name: minimind_pad
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 8
  num_workers: 4

loss:
  name: dpo
  beta: 0.1

optim:
  name: adamw
  lr: 1.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.01

scheduler:
  name: warmup_cosine
  warmup_steps: 10
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: preference
  max_steps: 2000
  val_every: 0
  ckpt_every: 500
  log_every: 50
  grad_clip: 1.0
  accumulate: 4

logger:
  - { name: console, log_every: 50 }
  - { name: jsonl }
  - { name: tensorboard }
