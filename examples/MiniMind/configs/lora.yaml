# MiniMind LoRA SFT — 对应原 trainer/train_lora.py
#
# 在 SFT 检查点基础上用 LoRA 微调，显存更低。
# 预先用 sft.yaml 训练得到基础 SFT 权重，或直接从 pretrain 权重起步。
#
# 训练：
#   lighttrain train -c examples/MiniMind/configs/lora.yaml

user_modules:
  - examples/MiniMind/model/model_adapter.py
  - examples/MiniMind/dataset/lm_dataset.py

mode: prod
seed: 42
exp: minimind_lora
run_root: runs

model: default
model_profiles:
  default:
    name: lora            # lighttrain 内置 LoRA 封装
    base:
      name: minimind
      hidden_size: 512
      num_hidden_layers: 8
    rank: 16
    alpha: 32.0
    target_modules: [q_proj, k_proj, v_proj, o_proj]

data:
  name: simple
  dataset:
    name: minimind_sft
    jsonl_path: dataset/sft_mini_512.jsonl
    max_length: 512
  tokenizer:
    name: hf_auto
    path: examples/MiniMind/model
  collator:
    name: minimind_pad
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 32
  num_workers: 8

loss:
  name: cross_entropy

optim:
  name: adamw
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.01

scheduler:
  name: warmup_cosine
  warmup_steps: 0
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: pretrain
  max_steps: 5000
  val_every: 0
  ckpt_every: 500
  log_every: 100
  grad_clip: 1.0
  accumulate: 8

callbacks:
  - { name: throughput, window: 50 }

logger:
  - { name: console, log_every: 100 }
  - { name: jsonl }
