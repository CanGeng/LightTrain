# MiniMind 知识蒸馏 — 对应原 trainer/train_distillation.py
#
# student 从 teacher 的 logits 中蒸馏。
# teacher 使用更大的 MiniMind（hidden_size=768）或已训练的 SFT 权重。
#
# 训练：
#   lighttrain train -c examples/MiniMind/configs/distillation.yaml

user_modules:
  - examples/MiniMind/model/model_adapter.py
  - examples/MiniMind/dataset/lm_dataset.py

mode: prod
seed: 42
exp: minimind_distillation
run_root: runs

models:
  # ↓ multi-model schema，无法直接继承 _model.yaml；student 架构应与 _model.yaml 一致
  student:
    name: minimind
    hidden_size: 512
    num_hidden_layers: 8
  teacher:
    name: minimind
    hidden_size: 768          # 有意更大；与 student 独立
    num_hidden_layers: 16
    trainable: false
    checkpoint: runs/minimind_pretrain/checkpoints/best

data:
  name: simple
  dataset:
    name: minimind_sft
    jsonl_path: dataset/sft_mini_512.jsonl
    max_length: 512
  tokenizer:
    name: hf_auto
    path: examples/MiniMind/model
  collator:
    name: minimind_pad
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 16
  num_workers: 4

loss:
  name: distill
  temperature: 2.0
  alpha: 0.7               # weight for soft targets vs hard labels

optim:
  name: adamw
  lr: 2.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.01

scheduler:
  name: warmup_cosine
  warmup_steps: 50
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: pretrain
  max_steps: 5000
  val_every: 0
  ckpt_every: 500
  log_every: 100
  grad_clip: 1.0
  accumulate: 4

logger:
  - { name: console, log_every: 100 }
  - { name: jsonl }
  - { name: tensorboard }
