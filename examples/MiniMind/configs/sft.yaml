# MiniMind 全参数 SFT — 对应原 trainer/train_full_sft.py
#
# 数据格式：{"conversations": [{"role": "user", "content": "..."}, ...]}
#
# 训练：
#   lighttrain train -c examples/MiniMind/configs/sft.yaml

user_modules:
  - examples/MiniMind/model/model_adapter.py
  - examples/MiniMind/dataset/lm_dataset.py

mode: prod
seed: 42
exp: minimind_sft
run_root: runs

model: default
model_profiles:
  default:
    name: minimind
    hidden_size: 512
    num_hidden_layers: 8
    use_moe: false

data:
  name: simple
  dataset:
    name: minimind_sft
    jsonl_path: dataset/sft_mini_512.jsonl
    max_length: 512
  tokenizer:
    name: hf_auto
    path: examples/MiniMind/model
  collator:
    name: minimind_pad
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 32
  num_workers: 8

loss:
  name: cross_entropy

optim:
  name: adamw
  lr: 5.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.01

scheduler:
  name: warmup_cosine
  warmup_steps: 0
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: pretrain
  max_steps: 10000
  val_every: 0
  ckpt_every: 1000
  log_every: 100
  grad_clip: 1.0
  accumulate: 8

callbacks:
  - { name: throughput, window: 50 }

logger:
  - { name: console, log_every: 100 }
  - { name: jsonl }
  - { name: tensorboard }
