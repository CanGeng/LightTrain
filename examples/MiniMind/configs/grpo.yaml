# MiniMind GRPO — 对应原 trainer/train_grpo.py
#
# 数据格式：{"conversations": [...]}（同 RLAIF 格式）
#
# 训练：
#   lighttrain train -c examples/MiniMind/configs/grpo.yaml

defaults:
  - _model

user_modules:
  - examples/MiniMind/model/model_adapter.py
  - examples/MiniMind/dataset/lm_dataset.py

mode: prod
seed: 42
exp: minimind_grpo
run_root: runs

data:
  name: simple
  dataset:
    name: minimind_rlaif
    jsonl_path: dataset/rlaif_mini.jsonl
    max_length: 512
  tokenizer:
    name: hf_auto
    path: examples/MiniMind/model
  collator:
    name: minimind_pad
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 4
  num_workers: 4

optim:
  name: adamw
  lr: 1.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.01

scheduler:
  name: warmup_cosine
  warmup_steps: 10
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: grpo
  max_steps: 1000
  val_every: 0
  ckpt_every: 500
  log_every: 10
  grad_clip: 1.0
  group_size: 4
  kl_coef: 0.04
  clip_ratio: 0.2
  max_new_tokens: 256

logger:
  - { name: console, log_every: 10 }
  - { name: jsonl }
  - { name: tensorboard }
