# Single-machine 8-GPU FSDP training (ZeRO-3 equivalent).
# Launch: torchrun --nproc_per_node 8 -m lighttrain.cli train -c examples/references/recipes/fsdp.yaml

parallel:
  backend: nccl
  dp: 8
  grad_sync:
    name: fsdp
    sharding_strategy: FULL_SHARD
    mixed_precision_policy: bf16
    activation_checkpointing: true
    state_dict_type: full

engine:
  name: standard
  mixed_precision: "no"  # FSDP handles mixed precision internally

trainer:
  name: pretrain
  max_steps: 1000
  ckpt_every: 500
  grad_clip: 1.0
  accumulate: 4
