# R7 — RWKV stateful language model pretraining (DESIGN §13.2 / §26.9).
#
# Trains a TinyRWKVModel using next-token prediction.  The RWKV recurrent
# state is carried across chunks of the same document and reset at document
# boundaries (batch["_doc_boundary"] = True).
#
# Run with:
#   python -c "from lighttrain.builtin_plugins.architectures.rwkv import TinyRWKVModel"
#   lighttrain train -c examples/references/recipes/pretrain_rwkv.yaml

mode: lab
seed: 42
exp: r7_rwkv
run_root: runs

model: default
model_profiles:
  default:
    name: tiny_rwkv
    vocab_size: 256
    embed_dim: 64
    num_layers: 2
    chunk_size: 64

data:
  name: simple
  dataset:
    name: line_file_text
    path: tests/fixtures/tiny_corpus.txt
    max_len: 64
    # Split each document into fixed-size chunks; the first chunk carries
    # _doc_boundary=True so the RWKV state resets at document boundaries and is
    # carried across a document's chunks.
    chunk_size: 16
  tokenizer:
    name: byte
  collator:
    name: causal_lm
    max_len: 64
  # Sequential (not shuffled) + batch_size 1: chunks arrive in document order so
  # recurrent state is carried within a document; the per-step _doc_boundary flag
  # is batch-level, so batch_size must be 1 (the collator enforces this).
  sampler:
    name: sequential
  batch_size: 1
  num_workers: 0

optim:
  name: adamw
  lr: 1.0e-3
  betas: [0.9, 0.95]
  weight_decay: 0.01

scheduler:
  name: warmup_cosine
  warmup_steps: 10
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: "no"
  update_rule:
    name: standard   # grad_clip/accumulate are controlled by trainer:

trainer:
  name: pretrain
  max_steps: 200
  val_every: 0
  ckpt_every: 200
  log_every: 20
  arch_profile: rwkv

callbacks:
  - { name: throughput, window: 20 }
  - { name: nan_skip, max_skips: 5 }

logger:
  - { name: console, log_every: 20 }
  - { name: jsonl }
