# R6 — GRPO (Group Relative Policy Optimization) + VerifierJudge (DESIGN §15.4 / §26.8).
#
# For each prompt, GRPOTrainer generates `group_size` responses, computes
# group-relative advantages (mean/std normalised within the group), and
# applies a clipped surrogate update without a value model.
#
# Run with:
#   lighttrain train -c examples/references/recipes/grpo.yaml

mode: lab
seed: 99
exp: r6_grpo
run_root: runs

model: default
model_profiles:
  default:
    name: tiny_lm
    vocab_size: 260
    d_model: 256
    n_layers: 4
    n_heads: 8
    max_seq_len: 256
    dropout: 0.0

# ----- data ——————————————————————————————————————————————————————————————————
# Prompt-only dataset; GRPO generates `group_size` completions per prompt.
data:
  name: simple
  dataset:
    name: line_file_text
    path: tests/fixtures/tiny_corpus.txt
    max_len: 64          # prompt length
  tokenizer:
    name: byte
  collator:
    name: causal_lm
    max_len: 64
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 2          # prompts per outer step; total responses = batch_size × group_size
  num_workers: 0

# ----- judge (reward) ————————————————————————————————————————————————————————
judge:
  name: verifier
  verify_pattern: "\\d+"  # 1.0 if response contains any digit, else 0.0

# ----- optimiser + scheduler ————————————————————————————————————————————————
optim:
  name: adamw
  lr: 1.0e-5
  betas: [0.9, 0.95]
  weight_decay: 0.0

scheduler:
  name: warmup_cosine
  warmup_steps: 5
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.0

# ----- loss ——————————————————————————————————————————————————————————————————
# The RL surrogate is now selected via the loss: seam (keystone step 3).
loss:
  name: grpo
  clip_eps: 0.2
  beta_kl: 0.0           # set > 0 to add KL penalty against frozen reference

# ----- engine ————————————————————————————————————————————————————————————————
engine:
  name: standard
  mixed_precision: "no"

# ----- trainer ———————————————————————————————————————————————————————————————
trainer:
  name: grpo
  max_steps: 50
  ckpt_every: 50
  log_every: 10
  group_size: 4          # G — completions per prompt
  ppo_epochs: 1
  mini_batch_size: 4
  max_new_tokens: 64
  lora_base_as_ref: false

# ----- callbacks + logger ————————————————————————————————————————————————————
callbacks:
  - { name: throughput, window: 10 }
  - { name: nan_skip, max_skips: 5 }

logger:
  - { name: console, log_every: 10 }
  - { name: jsonl }
