# Image classification — TinyCNNClassifier on synthetic class-separable images.
#
# The reference supervised-vision workflow: a small conv-net (image -> label)
# trained with supervised cross-entropy via the *generic* `pretrain` trainer +
# the `classification` loss — no objective/trainer subclassing. Loss should drop
# and `acc` rise over 200 steps on the synthetic dataset.
#
# Run with:
#   lighttrain train -c examples/references/recipes/image_cls.yaml

mode: lab
seed: 7
exp: r_image_cls
run_root: runs

# Demo-only synthetic dataset (synthetic_image); not a core component.
user_modules: [examples/references/vision_components.py]

model: default
model_profiles:
  default:
    name: tiny_cnn
    in_channels: 3
    num_classes: 4
    channels: [8, 16]

data:
  name: simple
  dataset:
    name: synthetic_image
    num_classes: 4
    in_channels: 3
    image_size: 8
    num_samples: 512
    noise: 0.3
    seed: ${seed}
  collator:
    name: image
  batch_size: 16
  num_workers: 0

loss:
  name: classification

optim:
  name: adamw
  lr: 1.0e-3
  betas: [0.9, 0.999]
  weight_decay: 0.0

scheduler:
  name: constant

engine:
  name: standard
  mixed_precision: "no"
  update_rule:
    name: standard

trainer:
  name: pretrain
  max_steps: 200
  val_every: 0
  ckpt_every: 200
  log_every: 20

callbacks:
  - { name: throughput, window: 20 }

logger:
  - { name: console, log_every: 20 }
  - { name: jsonl }
