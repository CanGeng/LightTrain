# nano_model.yaml — gloo + CPU multi-process communication test
# Purpose: verify gloo process group init, DDP AllReduce, and full training loop without deadlock.
#
# Launch: torchrun --nproc_per_node=4 -m lighttrain.cli train -c examples/references/recipes/nano_model.yaml
#
# Model size: ~115K params (embed 16K + 2 × Transformer layers ~50K each)

parallel:
  backend: gloo
  dp: 4
  force_cpu: true
  grad_sync:
    name: ddp
    find_unused_parameters: false

model: default
model_profiles:
  default:
    name: tiny_lm
    vocab_size: 256
    d_model: 64
    n_layers: 2
    n_heads: 4
    max_seq_len: 32

data:
  name: simple
  dataset:
    name: line_file_text
    path: tests/fixtures/tiny_corpus.txt
    max_len: 32
  tokenizer:
    name: byte
  collator:
    name: causal_lm
    max_len: 32
  sampler:
    name: shuffle
    seed: 42
  batch_size: 8
  num_workers: 0

optim:
  name: adamw
  lr: 1.0e-3
  weight_decay: 0.01

loss:
  name: cross_entropy

engine:
  name: standard
  mixed_precision: "no"

trainer:
  name: pretrain
  max_steps: 20
  ckpt_every: 0
  log_every: 5
  grad_clip: 1.0
  accumulate: 1

mode: lab
seed: 42
run_root: runs
exp: nano_gloo_test
