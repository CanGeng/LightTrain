# Fork + resume recipe — base config for R16 acceptance test (DESIGN §26.10).
#
# Workflow (R16):
#   Step 1 — Train gen-1 for 50 steps:
#     lighttrain train -c examples/references/recipes/fork_resume.yaml
#
#   Step 2 — Fork gen-1 checkpoint with halved LR (gen-2):
#     python - <<'EOF'
#     from pathlib import Path
#     from lighttrain.lab.fork import fork
#     from lighttrain.config import load_config
#     cfg = load_config("examples/references/recipes/fork_resume.yaml", ["++optim.lr=1.5e-4", "++exp=fork_gen2"])
#     report = fork(Path("runs/fork_gen1/<run_dir>/checkpoints/step_50"), cfg)
#     print(report.new_run_dir)
#     EOF
#
#   Step 3 — Fork gen-2 checkpoint into gen-3 with even lower LR:
#     (same as above with gen-3 exp and lr=7.5e-5)
#
#   Verify: lineage store in gen-2/gen-3 run dirs contains fork_of edges.

mode: lab
seed: 1337
exp: fork_gen1
run_root: runs

model: default
model_profiles:
  default:
    name: tiny_lm
    vocab_size: 260
    d_model: 128
    n_layers: 2
    n_heads: 4
    max_seq_len: 64
    dropout: 0.0

data:
  name: simple
  dataset:
    name: line_file_text
    path: tests/fixtures/tiny_corpus.txt
    max_len: 64
  tokenizer:
    name: byte
  collator:
    name: causal_lm
    max_len: 64
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 4
  num_workers: 0

loss:
  name: cross_entropy

optim:
  name: adamw
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

scheduler:
  name: warmup_cosine
  warmup_steps: 5
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: "no"

trainer:
  name: pretrain
  max_steps: 50
  val_every: 0
  ckpt_every: 50
  log_every: 10
  grad_clip: 1.0
  accumulate: 1

callbacks:
  - { name: nan_skip, max_skips: 5 }

logger:
  - { name: console, log_every: 10 }
  - { name: jsonl }
