# SFT chat recipe — HF tokenizer flavour (DESIGN R2 alternate).
#
# Identical to sft_chat.yaml except the tokenize processor uses a real HF
# tokenizer (Qwen 2.5 0.5B Instruct by default). Tests that exercise this
# recipe should be marked @pytest.mark.heavy because the tokenizer download
# is non-hermetic.

mode: lab
seed: 1337
exp: tiny_sft_chat_hf
run_root: runs

model: default
model_profiles:
  default:
    name: tiny_lm
    vocab_size: 151936  # Qwen 2.5 vocab; downstream test only checks shapes
    d_model: 256
    n_layers: 4
    n_heads: 8
    max_seq_len: 256
    dropout: 0.0

prep_graph:
  nodes:
    - name: raw
      kind: load
      source: jsonl:tests/fixtures/sft_chat.jsonl
      raw_data_version: "0"

    - name: tokenized
      kind: tokenize
      inputs: [raw]
      processor:
        name: hf_text
        model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
        max_len: 256
        response_only_mask: true

    - name: packed
      kind: pack
      inputs: [tokenized]
      seq_len: 256
      eos_id: 151643  # Qwen <|endoftext|>
      pad_id: 151643

    - name: train_data
      kind: materialize
      inputs: [packed]
      layout: rows
      fmt: jsonl

  terminals: [train_data]

data:
  name: prep_graph
  source: prep_graph:train_data
  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  collator: { name: causal_lm, max_len: 256, pad_id: 151643 }
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 4
  num_workers: 0

loss: { name: cross_entropy }

optim:
  name: adamw
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

scheduler:
  name: warmup_cosine
  warmup_steps: 20
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine: { name: standard, mixed_precision: bf16 }

trainer:
  name: pretrain
  max_steps: 100
  val_every: 0
  ckpt_every: 100
  log_every: 10
  grad_clip: 1.0
  accumulate: 1

callbacks:
  - { name: throughput, window: 10 }
  - { name: nan_skip, max_skips: 10 }

logger:
  - { name: console, log_every: 10 }
  - { name: jsonl }
