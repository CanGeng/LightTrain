# 8-GPU TP=2 + DDP=4 training (LLaMA-style architecture).
# Launch: torchrun --nproc_per_node 8 -m lighttrain.cli train -c plugins/distributed/recipes/tp_ddp.yaml

parallel:
  backend: nccl
  dp: 4
  tp: 2
  tensor_parallel:
    auto_plan_for: llama  # colwise Q/K/V/gate/up + rowwise O/down
  grad_sync:
    name: ddp
    find_unused_parameters: false

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: pretrain
  max_steps: 1000
  ckpt_every: 500
  grad_clip: 1.0
