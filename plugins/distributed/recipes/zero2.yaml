# 8-GPU DeepSpeed ZeRO-2 training.
# Launch: deepspeed --num_gpus 8 -m lighttrain.cli train -c plugins/distributed/recipes/zero2.yaml
# Or:     torchrun --nproc_per_node 8 -m lighttrain.cli train -c plugins/distributed/recipes/zero2.yaml

parallel:
  backend: nccl
  dp: 8
  grad_sync:
    name: deepspeed
    zero_stage: 2
    bf16: true
    gradient_clipping: 1.0

engine:
  name: standard
  mixed_precision: no  # DeepSpeed handles precision internally

trainer:
  name: pretrain
  max_steps: 1000
  ckpt_every: 500
  grad_clip: 1.0
