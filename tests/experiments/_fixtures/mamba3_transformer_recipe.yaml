# Self-contained PROFILE-form recipe for the v0.1.8 model_profiles round-trip
# test. Numerically identical to the transient dict-form recipe used to record
# mamba3_transformer_5step.json — the ONLY difference is the model is selected
# via `model: transformer` + a `model_profiles:` block instead of a bare
# `model:` dict. Uses the built-in tiny_lm model, so no user_modules needed.
#
# The test overrides `run_root` to a tmp dir and resolves the corpus path
# relative to this file, so it does not depend on the gitignored experiments/.
mode: lab
seed: 1337
exp: mamba3_transformer_round_trip
run_root: runs

model: transformer
model_profiles:
  transformer:
    name: tiny_lm
    vocab_size: 264
    d_model: 128
    n_layers: 4
    n_heads: 4
    max_seq_len: 256
    dropout: 0.0

data:
  name: simple
  dataset:
    name: line_file_text
    path: tests/experiments/_fixtures/corpus.txt
    max_len: 128
  tokenizer:
    name: byte
  collator:
    name: causal_lm
    max_len: 128
  sampler:
    name: shuffle
    seed: ${seed}
  batch_size: 4
  num_workers: 0

loss:
  name: cross_entropy

optim:
  name: adamw
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1

scheduler:
  name: warmup_cosine
  warmup_steps: 5
  total_steps: ${trainer.max_steps}
  min_lr_ratio: 0.1

engine:
  name: standard
  mixed_precision: bf16

trainer:
  name: pretrain
  max_steps: 5
  val_every: 0
  ckpt_every: 10
  log_every: 1
  grad_clip: 1.0
  accumulate: 1

callbacks:
  - { name: throughput, window: 5 }
  - { name: nan_skip, max_skips: 5 }

logger:
  - { name: jsonl }
